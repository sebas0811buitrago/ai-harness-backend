[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.importlinter]
root_packages = ["app", "shared", "features"]
include_external_packages = true

[[tool.importlinter.contracts]]
name = "domain is a pure sink - no framework imports"
type = "forbidden"
source_modules = ["features.todos.domain"]
forbidden_modules = ["fastapi", "sqlmodel", "sqlalchemy"]

[[tool.importlinter.contracts]]
name = "usecases do not depend on framework or adapters"
type = "forbidden"
source_modules = ["features.todos.usecases"]
forbidden_modules = ["fastapi", "sqlmodel", "sqlalchemy", "features.todos.adapters"]

[[tool.importlinter.contracts]]
name = "handlers do not import adapters directly"
type = "forbidden"
source_modules = ["features.todos.handlers"]
forbidden_modules = ["features.todos.adapters"]
ignore_imports = [
    "features.todos.handlers.router -> features.todos.deps",
]

[[tool.importlinter.contracts]]
name = "adapters do not import handlers"
type = "forbidden"
source_modules = ["features.todos.adapters"]
forbidden_modules = ["features.todos.handlers"]

[[tool.importlinter.contracts]]
name = "shared does not import features"
type = "forbidden"
source_modules = ["shared"]
forbidden_modules = ["features"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "ANN", # flake8-annotations (enforce type hints)
]
ignore = ["ANN101", "ANN102"]  # self/cls annotations not required

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_return_any = true
plugins = ["pydantic.mypy"]

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true
